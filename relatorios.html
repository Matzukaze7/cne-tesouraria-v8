<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatórios CNE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--sec:#1E6042;--fundo:#f4f7fb;--texto:#1f2937;--cne-green:#2B966C;--cne-dark:#1E6042;--cne-red:#BD242C;--cne-cream:#FDF7B9}*{box-sizing:border-box}body{font-family:"Brandon Grotesque",Arial,Helvetica,sans-serif;background:var(--fundo);padding:20px;margin:0;color:var(--texto)}.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;box-shadow:0 4px 12px #0001}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}select,input,textarea,button{width:100%;padding:10px;margin:5px 0;border:1px solid #d0d7e2;border-radius:8px}textarea{min-height:120px}button{background:var(--cne-dark);color:#fff;border:0;font-weight:700;cursor:pointer}.hidden{display:none}.muted{font-size:.9rem;color:#6b7280}.report{background:#fff;border-top:10px solid var(--sec);padding:12px;border-radius:10px}.rhead{display:grid;grid-template-columns:minmax(180px,260px) 1fr auto;gap:14px;align-items:center;border-bottom:2px solid var(--sec);padding-bottom:8px;margin-bottom:8px;min-height:96px}.rhead h1{font-size:19px;margin:0;color:var(--sec);letter-spacing:1.1px;text-transform:uppercase;font-weight:900;line-height:1.1}.rhead h2{font-size:14px;margin:3px 0 0;font-weight:700;line-height:1.2}.stamp{text-align:right;font-size:10.5px;color:#374151;min-width:115px}.brand-img{width:100%;max-width:250px;max-height:96px;object-fit:contain}.brand-official{width:100%;max-width:250px;height:96px}.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:5px;margin:7px 0}.meta div,.box{border:1px solid #e5e7eb;background:#f8fafc;border-radius:6px;padding:5px;font-size:11.5px}.meta b{display:block;color:var(--sec)}h3{font-size:13px;margin:10px 0 5px;color:var(--sec);letter-spacing:.45px;text-transform:uppercase}table{width:100%;border-collapse:collapse;margin:5px 0 10px;font-size:11.5px}th,td{border:1px solid #d7dde7;padding:4px;vertical-align:top;word-break:break-word}th{background:#eef2f7}.totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:7px}.nowrap{white-space:nowrap}.right{text-align:right}.cfg-title{border-left:8px solid var(--cne-green);padding-left:8px}@page{size:A4 landscape;margin:7mm}@media print{body{background:#fff;padding:0}.no-print{display:none}.card{box-shadow:none;border:0;padding:0;margin:0}.report{border-radius:0;border-top:8px solid var(--sec);padding:0}.rhead{grid-template-columns:240px 1fr 112px;min-height:88px;gap:10px;break-inside:avoid}.brand-official{height:88px}.brand-img{max-height:88px}.rhead h1{font-size:17pt}.rhead h2{font-size:10.5pt}.stamp{font-size:8.5pt}.box,.meta div,tr{break-inside:avoid}table{font-size:8.6pt;margin-bottom:7px}th,td{padding:2.7px 3.5px}h3{font-size:10.2pt;break-after:avoid}.meta div{font-size:8.5pt}}
</style>
</head>
<body>
<div class="card no-print"><h1>Relatórios CNE</h1><div class="grid">
<div><label>Âmbito do relatório</label><select id="relScope" onchange="renderSelectors();toggle();gerar()"><option>Agrupamento</option><option>Alcateia</option><option>Expedição</option><option>Comunidade</option><option>Clã</option></select></div>
<div><label>Tipo relatório</label><select id="tipo" onchange="toggle();gerar()"><option value="atividade">Atividade</option><option value="pessoa">Pessoa</option><option value="trimestre">Trimestre</option></select></div>
<div id="atividadeBox"><label>Atividade</label><select id="atividade" onchange="gerar()"></select></div>
<div id="pessoaBox" class="hidden"><label>Pessoa</label><select id="pessoa" onchange="loadPessoaAtividades();gerar()"></select></div>
<div id="pessoaModoBox" class="hidden"><label>Atividades no relatório de pessoa</label><select id="pessoaModo" onchange="loadPessoaAtividades();gerar()"><option value="todas">Todas</option><option value="secao">Só atividades de secção</option><option value="agrupamento">Só atividades de agrupamento</option></select></div>
<div id="pessoaAtividadeBox" class="hidden"><label>Atividade da pessoa</label><select id="atividadePessoa" onchange="gerar()"><option value="todas">Todas</option></select></div>
<div id="trimestreBox" class="hidden"><label>Trimestre</label><select id="trimestre" onchange="gerar()"><option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option><option>4º Trimestre</option></select></div>
<div><label>Estado movimentos</label><select id="estado" onchange="gerar()"><option value="todos">Todos</option><option value="rascunho">Rascunho</option><option value="por_validar">Por validar</option><option value="validado">Validado</option></select></div>
<div id="saldosOpcionaisBox"><label><input id="mostrarSaldosOpc" type="checkbox" onchange="gerar()"> Mostrar saldos também neste relatório</label></div>
</div><button onclick="window.print()">Imprimir / PDF</button><p class="muted">Os relatórios usam imagens oficiais predefinidas por âmbito. Nas configurações podes substituir por upload ou remover a imagem.</p></div>
<div class="card no-print"><h2 class="cfg-title">Configurações</h2><div class="grid">
<div><label>Âmbito a configurar</label><select id="cfgScope" onchange="syncConfigUI()"><option>Agrupamento</option><option>Alcateia</option><option>Expedição</option><option>Comunidade</option><option>Clã</option></select></div>
<div><label>Caixa inicial</label><input id="cfgCaixa" type="number" step="0.01" value="0"></div><div><label>Banco inicial</label><input id="cfgBanco" type="number" step="0.01" value="0"></div><div><label>Referência</label><input id="cfgData" type="date"></div>
<div><label>Imagem/logótipo deste âmbito</label><input id="cfgImg" type="file" accept="image/*" onchange="loadImage(event)"></div><div><label>Imagem no relatório</label><select id="cfgBrandMode"><option value="oficial">Oficial predefinida</option><option value="upload">Imagem carregada</option><option value="nenhuma">Sem imagem</option></select></div>
</div><label>Tipos de movimento SIIC deste âmbito</label><textarea id="cfgTipos" placeholder="Um tipo por linha"></textarea><button onclick="saveConfig();renderSelectors();gerar()">Guardar configuração</button><p class="muted" id="cfgStatus"></p></div>
<div class="card" id="output"></div>
<script>
const db=supabase.createClient('https://ebyovpnqlgjrseudaqet.supabase.co','sb_publishable_umMHXkrCZk-VM2oKncUjAg_zqx_NDUN');
const secoes=['Alcateia','Expedição','Comunidade','Clã'];
const state={pessoas:[],atividades:[],movimentos:[],presencas:[],config:{saldos:{},images:{},brandMode:{},tipos:{}}};
const defaultTipos={Agrupamento:['Água','Anuidade Cartão MB','Atividades Agrupamento','Atividades Financeiras Agrupamento','Censos','Censos e Seguros','Compras DMF','Comunicações','Doações','Eletricidade','Formação','Jóias','Manutenção','Material Secretaria','Mov. Tesouraria Agrupamento','Outros Agrupamento','Quotas Agrupamento'],Alcateia:['Caçadas','Atividades Financeiras Alcateia','Quotas Alcateia','Compras DMF','Doações','Material Didático Alcateia','Mov. Tesouraria','Outros Alcateia'],Expedição:['Aventuras','Atividades Financeiras Expedição','Quotas Expedição','Compras DMF','Doações','Material Didático Expedição','Mov. Tesouraria','Reuniões Semanais Exp.','Outros Expedição'],Comunidade:['Empreendimentos','Atividades Financeiras Comunidade','Quotas Comunidade','Compras DMF','Doações','Material Didático Comunidade','Mov. Tesouraria','Outros Comunidade'],Clã:['Caminhadas','Atividades Financeiras Clã','Quotas Clã','Compras DMF','Doações','Material Didático Clã','Mov. Tesouraria','Outros Clã']};
const secColors={Agrupamento:'#1E6042',Alcateia:'#F2C94C',Expedição:'#2B966C',Comunidade:'#155E75',Clã:'#BD242C'};
function $(i){return document.getElementById(i)}function euro(v){return Number(v||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR'})}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function relScope(){return $('relScope')?.value||'Agrupamento'}function cfgScope(){return $('cfgScope')?.value||'Agrupamento'}function isAgr(){return relScope()==='Agrupamento'}
function loadConfig(){try{state.config=Object.assign(state.config,JSON.parse(localStorage.getItem('cne_report_config')||'{}'))}catch(e){};state.config.saldos=state.config.saldos||{};state.config.images=state.config.images||{};state.config.brandMode=state.config.brandMode||{};state.config.tipos=state.config.tipos||{};syncConfigUI()}
function syncConfigUI(){const s=cfgScope();const sal=state.config.saldos[s]||{caixa:0,banco:0,data:''};$('cfgCaixa').value=sal.caixa||0;$('cfgBanco').value=sal.banco||0;$('cfgData').value=sal.data||'';$('cfgBrandMode').value=state.config.brandMode[s]||'oficial';$('cfgTipos').value=(state.config.tipos[s]||defaultTipos[s]||[]).join('\n');updateCfgStatus()}
function saveConfig(){const s=cfgScope();state.config.saldos[s]={caixa:Number($('cfgCaixa').value||0),banco:Number($('cfgBanco').value||0),data:$('cfgData').value||''};state.config.brandMode[s]=$('cfgBrandMode').value;state.config.tipos[s]=$('cfgTipos').value.split('\n').map(x=>x.trim()).filter(Boolean);localStorage.setItem('cne_report_config',JSON.stringify(state.config));updateCfgStatus()}
function loadImage(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{state.config.images[cfgScope()]=r.result;state.config.brandMode[cfgScope()]='upload';localStorage.setItem('cne_report_config',JSON.stringify(state.config));syncConfigUI();gerar()};r.readAsDataURL(f)}
function updateCfgStatus(){const s=cfgScope();const sal=state.config.saldos[s]||{};$('cfgStatus').innerText=`Configuração ativa: ${s} | Caixa ${euro(sal.caixa||0)} | Banco ${euro(sal.banco||0)} | imagem: ${state.config.brandMode?.[s]||'oficial'}`}
function salConfig(sec=relScope()){return state.config.saldos?.[sec]||{caixa:0,banco:0,data:''}}
function dataMov(m){const a=state.atividades.find(x=>x.id===m.atividade_id);return m.data_operacao||m.data||m.created_at?.slice(0,10)||a?.data_inicio||''}
function trim(d){if(!d)return'';const m=new Date(d).getMonth()+1;if(m>=10)return'1º Trimestre';if(m<=3)return'2º Trimestre';if(m<=6)return'3º Trimestre';return'4º Trimestre'}
function setSec(sec){document.documentElement.style.setProperty('--sec',secColors[sec]||secColors.Agrupamento)}
function officialMark(sec){const c=secColors[sec]||secColors.Agrupamento;const name=sec==='Agrupamento'?'AGRUP. 276 SANTA CRUZ DO BISPO':sec.toUpperCase();const sub=sec==='Agrupamento'?'CORPO NACIONAL DE ESCUTAS':'';let icon='';if(sec==='Alcateia')icon=`<circle cx='34' cy='23' r='8'/><circle cx='52' cy='23' r='8'/><circle cx='22' cy='43' r='8'/><circle cx='64' cy='43' r='8'/><path d='M43 42 L60 65 H26 Z' fill='${c}'/>`;else if(sec==='Expedição')icon=`<rect x='31' y='12' width='24' height='8' rx='4'/><path d='M43 25 C62 25 68 66 62 70 H24 C18 66 24 25 43 25 Z'/><circle cx='43' cy='48' r='13' fill='white'/>`;else if(sec==='Comunidade')icon=`<circle cx='43' cy='43' r='31'/><circle cx='43' cy='43' r='18' fill='white'/><path d='M43 32 L58 43 L43 54 Z' fill='${c}'/>`;else if(sec==='Clã')icon=`<path d='M25 16 C34 10 39 24 43 31 C47 24 52 10 61 16 C70 24 54 37 48 44 V70 H38 V44 C32 37 16 24 25 16 Z'/>`;else icon=`<path d='M43 8 C25 25 18 43 19 58 C27 44 34 44 39 54 V72 H47 V54 C52 44 59 44 67 58 C68 43 61 25 43 8 Z'/><path d='M21 58 H65 M43 35 V76' stroke='#BD242C' stroke-width='10' stroke-linecap='round'/><path d='M33 78 L43 86 L53 78' stroke='${c}' stroke-width='7' fill='none'/>`;return `<svg class='brand-official' viewBox='0 0 260 90' xmlns='http://www.w3.org/2000/svg'><g fill='${c}'>${icon}</g><text x='92' y='35' font-size='17' font-weight='900' fill='${sec==='Agrupamento'?'#1E6042':c}' letter-spacing='1.6'>${name}</text>${sub?`<text x='92' y='58' font-size='11' fill='#2B966C' letter-spacing='2'>${sub}</text>`:''}</svg>`}
function logoHtml(sec){const mode=state.config.brandMode?.[sec]||'oficial';const img=state.config.images?.[sec];if(mode==='upload'&&img)return `<img class='brand-img' src='${img}'>`;if(mode==='nenhuma')return `<div></div>`;return officialMark(sec)}
function header(titulo,sub,sec='Agrupamento'){setSec(sec);return `<div class='report'><div class='rhead'><div>${logoHtml(sec)}</div><div><h1>${esc(titulo)}</h1><h2>${esc(sub||'')}</h2></div><div class='stamp'><b>Corpo Nacional de Escutas</b><br>${esc(sec)}<br>${new Date().toLocaleDateString('pt-PT')}</div></div>`}
function meta(items){return `<div class='meta'>${items.map(i=>`<div><b>${esc(i[0])}</b>${i[1]}</div>`).join('')}</div>`}
function secMov(m){const a=state.atividades.find(x=>x.id===m.atividade_id);return m.secao_origem||a?.secao_origem||a?.secao||'Agrupamento'}
function isGroupEntity(x){return (x?.conta_financeira||x?.ambito)==='agrupamento'}function activityOrigin(a){return a?.secao_origem||a?.secao||'Agrupamento'}
function scopeActivities(){const s=relScope();return state.atividades.filter(a=>isAgr()?isGroupEntity(a)||activityOrigin(a)==='Agrupamento':activityOrigin(a)===s&&!isGroupEntity(a))}
function scopeMovimentos(ms=state.movimentos){const s=relScope();return ms.filter(m=>isAgr()?isGroupEntity(m)||secMov(m)==='Agrupamento':secMov(m)===s&&!isGroupEntity(m))}
function pessoaModoOk(m){const modo=$('pessoaModo')?.value||'todas';if(modo==='todas')return true;return modo==='agrupamento'?isGroupEntity(m):!isGroupEntity(m)}
async function init(){loadConfig();for(const t of ['pessoas','atividades','movimentos','presencas']){const r=await db.from(t).select('*');state[t]=r.data||[]}renderSelectors();toggle();gerar()}
function renderSelectors(){const acts=scopeActivities();$('atividade').innerHTML=acts.map(a=>`<option value='${a.id}'>${esc(a.nome)}</option>`).join('');const pessoas=isAgr()?state.pessoas:state.pessoas.filter(p=>p.secao===relScope());$('pessoa').innerHTML=pessoas.map(p=>`<option value='${p.id}'>${esc(p.nome)}</option>`).join('');loadPessoaAtividades()}
function toggle(){const t=$('tipo').value;$('atividadeBox').classList.toggle('hidden',t!=='atividade');$('pessoaBox').classList.toggle('hidden',t!=='pessoa');$('pessoaModoBox').classList.toggle('hidden',t!=='pessoa');$('pessoaAtividadeBox').classList.toggle('hidden',t!=='pessoa');$('trimestreBox').classList.toggle('hidden',t!=='trimestre');$('saldosOpcionaisBox').classList.toggle('hidden',t==='trimestre')}
function loadPessoaAtividades(){const p=$('pessoa').value;const ids=[...new Set(scopeMovimentos().filter(m=>m.pessoa_id===p&&m.atividade_id&&pessoaModoOk(m)).map(m=>m.atividade_id))];$('atividadePessoa').innerHTML='<option value="todas">Todas</option>'+ids.map(id=>{const a=state.atividades.find(x=>x.id===id);return `<option value='${id}'>${esc(a?a.nome:'Sem atividade')}</option>`}).join('')}
function filtroEstado(ms){const e=$('estado').value;return e==='todos'?ms:ms.filter(m=>m.estado_validacao===e)}function rec(ms){return ms.filter(m=>m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0)}function pag(ms){return ms.filter(m=>m.tipo==='pagamento').reduce((s,m)=>s+Number(m.valor||0),0)}function origem(m){return (m.origem||'caixa').toLowerCase()}
function saldos(ms){const sal=salConfig(relScope());const ci=Number(sal.caixa||0),bi=Number(sal.banco||0);const mc=ms.filter(m=>origem(m)==='caixa'),mb=ms.filter(m=>origem(m)==='banco');const cf=ci+rec(mc)-pag(mc),bf=bi+rec(mb)-pag(mb);return `<h3>Saldos caixa/banco</h3><div class='totals'><div class='box'><p><b>Caixa inicial:</b> ${euro(ci)}</p><p><b>Caixa final:</b> ${euro(cf)}</p></div><div class='box'><p><b>Banco inicial:</b> ${euro(bi)}</p><p><b>Banco final:</b> ${euro(bf)}</p></div><div class='box'><p><b>Saldo inicial total:</b> ${euro(ci+bi)}</p><p><b>Saldo final total:</b> ${euro(cf+bf)}</p></div>${sal.data?`<div class='box'><p><b>Referência:</b> ${sal.data}</p></div>`:''}</div>`}
function gerar(){const t=$('tipo').value;if(t==='atividade')relAtividade();if(t==='pessoa')relPessoa();if(t==='trimestre')relTrimestre()}
function relAtividade(){const a=state.atividades.find(x=>x.id===$('atividade').value);if(!a)return $('output').innerHTML=header('Relatório de Atividade','Sem atividade',relScope())+'</div>';let ms=filtroEstado(scopeMovimentos(state.movimentos.filter(m=>m.atividade_id===a.id)));const origemAtividade=activityOrigin(a);const sec=isAgr()?'Agrupamento':origemAtividade;const pessoas=(isAgr()?state.pessoas.filter(p=>ms.some(m=>m.pessoa_id===p.id)):state.pessoas.filter(p=>p.secao===origemAtividade));let html=header('Relatório de Atividade',a.nome,sec)+meta([['Relatório',esc(sec)],['Secção/origem da atividade',esc(origemAtividade)],['Tipo SIIC',esc(a.tipo||'')],['Trimestre',trim(a.data_inicio)],['Datas',`${a.data_inicio||''} a ${a.data_fim||''}`],['Âmbito',esc(a.ambito||'secao')],['Conta',esc(a.conta_financeira||'secao')]])+`<h3>Pessoas da atividade - ${esc(origemAtividade)}</h3><table><tr><th>Pessoa</th><th>Presença</th><th>Recebido</th><th>Estado</th></tr>${pessoas.map(p=>{const pr=state.presencas.find(x=>x.pessoa_id===p.id&&x.atividade_id===a.id);const total=ms.filter(m=>m.pessoa_id===p.id&&m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0);return `<tr><td>${esc(p.nome)}</td><td>${esc(pr?pr.estado:'pendente')}</td><td class='right nowrap'>${euro(total)}</td><td>${total>=Number(a.valor_padrao||0)?'Pago':total>0?'Parcial':'Não pago'}</td></tr>`}).join('')}</table><h3>Movimentos associados à atividade</h3>${movTable(ms)}${isAgr()?secSubtotals(ms):''}${subtotais(ms)}`;if($('mostrarSaldosOpc').checked)html+=saldos(ms);$('output').innerHTML=html+'</div>'}
function relPessoa(){const p=state.pessoas.find(x=>x.id===$('pessoa').value);if(!p)return;let ms=scopeMovimentos(state.movimentos.filter(m=>m.pessoa_id===p.id&&pessoaModoOk(m)));if($('atividadePessoa').value!=='todas')ms=ms.filter(m=>m.atividade_id===$('atividadePessoa').value);ms=filtroEstado(ms);const actIds=new Set(ms.filter(m=>m.atividade_id).map(m=>m.atividade_id));const prs=state.presencas.filter(pr=>pr.pessoa_id===p.id&&($('atividadePessoa').value==='todas'?actIds.has(pr.atividade_id):pr.atividade_id===$('atividadePessoa').value));let html=header('Relatório de Pessoa',p.nome,p.secao)+meta([['Relatório',esc(relScope())],['Secção',esc(p.secao)],['Filtro tipo de atividade',$('pessoaModo')?.selectedOptions?.[0]?.textContent||'Todas'],['Filtro atividade',$('atividadePessoa').value==='todas'?'Todas':esc(state.atividades.find(a=>a.id===$('atividadePessoa').value)?.nome||'—')]])+`<h3>Presenças associadas</h3><table><tr><th>Atividade</th><th>Âmbito</th><th>Data</th><th>Trimestre</th><th>Presença</th></tr>${prs.map(pr=>{const a=state.atividades.find(x=>x.id===pr.atividade_id);return `<tr><td>${esc(a?.nome||'Sem atividade')}</td><td>${isGroupEntity(a)?'Agrupamento':'Secção'}</td><td>${a?.data_inicio||''}</td><td>${trim(a?.data_inicio)}</td><td>${esc(pr.estado)}</td></tr>`}).join('')||'<tr><td colspan="5">Sem presenças registadas.</td></tr>'}</table><h3>Movimentos associados à pessoa</h3>${movTable(ms)}${subtotais(ms)}`;if($('mostrarSaldosOpc').checked)html+=saldos(ms);$('output').innerHTML=html+'</div>'}
function relTrimestre(){const tr=$('trimestre').value;let ms=scopeMovimentos(state.movimentos.filter(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);return a?trim(a.data_inicio)===tr:trim(dataMov(m))===tr}));ms=filtroEstado(ms);const acts=scopeActivities().filter(a=>trim(a.data_inicio)===tr);const semAtividade=ms.filter(m=>!m.atividade_id||!state.atividades.some(a=>a.id===m.atividade_id));const comAtividade=ms.filter(m=>m.atividade_id&&state.atividades.some(a=>a.id===m.atividade_id));const sec=relScope();$('output').innerHTML=header('Relatório de Trimestre',`${tr} — ${sec}`,sec)+meta([['Relatório',esc(sec)],['Movimentos',ms.length],['Atividades',acts.length],['Recebimentos',euro(rec(ms))],['Pagamentos',euro(pag(ms))],['Líquido',euro(rec(ms)-pag(ms))]])+saldos(ms)+(isAgr()?`<h3>Subtotais por secção</h3>${secSubtotals(ms)}<h3>Movimentos próprios do agrupamento</h3>${movTable(ms.filter(m=>secMov(m)==='Agrupamento'))}`:'')+`<h3>Subtotais por tipo de movimento SIIC</h3>${siicTable(ms)}<h3>Movimentos associados a atividades</h3>${movTable(comAtividade)}<h3>Movimentos administrativos sem atividade</h3>${movTableSemAtividade(semAtividade)}${subtotais(ms)}</div>`}
function secSubtotals(ms){const rows=secoes.concat(['Agrupamento']).map(s=>{const sm=ms.filter(m=>secMov(m)===s);if(!sm.length&&s!=='Agrupamento')return '';return `<tr><td>${esc(s)}</td><td class='right nowrap'>${euro(rec(sm))}</td><td class='right nowrap'>${euro(pag(sm))}</td><td class='right nowrap'>${euro(rec(sm)-pag(sm))}</td></tr>`}).join('');return `<table><tr><th>Secção / Origem</th><th>Recebimentos</th><th>Pagamentos</th><th>Total líquido</th></tr>${rows}</table>`}
function siicTable(ms){const tipos=[...new Set(ms.map(m=>m.tipo_movimento||'Sem tipo SIIC'))].sort();return `<table><tr><th>Tipo SIIC</th><th>Recebimentos</th><th>Pagamentos</th><th>Total líquido</th></tr>${tipos.map(t=>{const tm=ms.filter(m=>(m.tipo_movimento||'Sem tipo SIIC')===t);return `<tr><td>${esc(t)}</td><td class='right nowrap'>${euro(rec(tm))}</td><td class='right nowrap'>${euro(pag(tm))}</td><td class='right nowrap'>${euro(rec(tm)-pag(tm))}</td></tr>`}).join('')}</table>`}
function movTable(ms){return `<table><tr><th>Data</th><th>Origem</th><th>Atividade</th><th>Pessoa</th><th>Tipo</th><th>SIIC</th><th>Estado</th><th>Conta</th><th>Descrição</th><th>Valor</th></tr>${ms.map(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);const p=state.pessoas.find(x=>x.id===m.pessoa_id);return `<tr><td class='nowrap'>${esc(dataMov(m))}</td><td>${esc(secMov(m))}</td><td>${esc(a?a.nome:'Sem atividade')}</td><td>${esc(p?p.nome:'-')}</td><td>${esc(m.tipo||'')}</td><td>${esc(m.tipo_movimento||'')}</td><td>${esc(m.estado_validacao||'')}</td><td>${esc(m.conta_financeira||m.origem||'caixa')}</td><td>${esc(m.descricao||'')}</td><td class='right nowrap'>${euro(m.valor)}</td></tr>`}).join('')||'<tr><td colspan="10">Sem movimentos.</td></tr>'}</table>`}
function movTableSemAtividade(ms){return `<table><tr><th>Data</th><th>Origem</th><th>Pessoa/Entidade</th><th>Tipo</th><th>SIIC</th><th>Estado</th><th>Conta</th><th>Descrição</th><th>Valor</th></tr>${ms.map(m=>{const p=state.pessoas.find(x=>x.id===m.pessoa_id);return `<tr><td class='nowrap'>${esc(dataMov(m))}</td><td>${esc(secMov(m))}</td><td>${esc(p?p.nome:'-')}</td><td>${esc(m.tipo||'')}</td><td>${esc(m.tipo_movimento||'')}</td><td>${esc(m.estado_validacao||'')}</td><td>${esc(m.conta_financeira||m.origem||'caixa')}</td><td>${esc(m.descricao||'')}</td><td class='right nowrap'>${euro(m.valor)}</td></tr>`}).join('')||'<tr><td colspan="9">Sem movimentos administrativos.</td></tr>'}</table>`}
function subtotais(ms){return `<h3>Totais</h3><div class='totals'><div class='box'><p><b>Recebimentos:</b> ${euro(rec(ms))}</p></div><div class='box'><p><b>Pagamentos:</b> ${euro(pag(ms))}</p></div><div class='box'><p><b>Total líquido:</b> ${euro(rec(ms)-pag(ms))}</p></div></div>`}
init()
</script>
</body>
