<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatórios CNE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#f4f7fb;padding:20px;color:#1f2937}.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px}select,input,button{padding:10px;margin:5px;width:100%}button{background:#003366;color:#fff;border:0;border-radius:8px;font-weight:bold}table{width:100%;border-collapse:collapse;margin:8px 0 18px}th,td{border:1px solid #ddd;padding:8px;vertical-align:top}th{background:#eef2f7}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.hidden{display:none}.muted{color:#6b7280;font-size:.9rem}.box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin:8px 0}@media print{.card:first-child{display:none}body{background:#fff;padding:0}.card{box-shadow:none;border:0}}
</style>
</head>
<body>
<div class="card">
<h1>Relatórios CNE</h1>
<div class="grid">
<div><label>Tipo relatório</label><select id="tipo" onchange="toggle();gerar()"><option value="atividade">Atividade</option><option value="pessoa">Pessoa</option><option value="trimestre">Trimestre</option></select></div>
<div id="atividadeBox"><label>Atividade</label><select id="atividade" onchange="gerar()"></select></div>
<div id="pessoaBox" class="hidden"><label>Pessoa</label><select id="pessoa" onchange="loadPessoaAtividades();gerar()"></select></div>
<div id="pessoaAtividadeBox" class="hidden"><label>Atividade da pessoa</label><select id="atividadePessoa" onchange="gerar()"><option value="todas">Todas</option></select></div>
<div id="trimestreBox" class="hidden"><label>Trimestre</label><select id="trimestre" onchange="gerar()"><option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option><option>4º Trimestre</option></select></div>
<div><label>Estado movimentos</label><select id="estado" onchange="gerar()"><option value="todos">Todos</option><option value="rascunho">Rascunho</option><option value="por_validar">Por validar</option><option value="validado">Validado</option></select></div>
<div id="caixaBox"><label>Saldo inicial caixa</label><input id="caixa" type="number" value="0" onchange="gerar()"></div>
<div id="bancoBox"><label>Saldo inicial banco</label><input id="banco" type="number" value="0" onchange="gerar()"></div>
<div id="saldosOpcionaisBox"><label><input id="mostrarSaldosOpc" type="checkbox" onchange="gerar()"> Mostrar saldos também neste relatório</label></div>
</div>
<button onclick="window.print()">Imprimir / PDF</button>
<p class="muted">Os saldos são sempre usados no relatório trimestral. Em pessoa/atividade só aparecem se ativares a opção.</p>
</div>
<div class="card" id="output"></div>
<script>
const db=supabase.createClient('https://ebyovpnqlgjrseudaqet.supabase.co','sb_publishable_umMHXkrCZk-VM2oKncUjAg_zqx_NDUN');
const state={pessoas:[],atividades:[],movimentos:[],presencas:[]};
function euro(v){return Number(v||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR'})}
function $(i){return document.getElementById(i)}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function dataMov(m){const a=state.atividades.find(x=>x.id===m.atividade_id);return m.data_operacao||m.data||m.created_at?.slice(0,10)||a?.data_inicio||''}
function trim(d){if(!d)return'';const m=new Date(d).getMonth()+1;if(m>=10)return'1º Trimestre';if(m<=3)return'2º Trimestre';if(m<=6)return'3º Trimestre';return'4º Trimestre'}
async function init(){for(const t of ['pessoas','atividades','movimentos','presencas']){const r=await db.from(t).select('*');state[t]=r.data||[]}renderSelectors();toggle();gerar()}
function renderSelectors(){$('atividade').innerHTML=state.atividades.map(a=>`<option value="${a.id}">${esc(a.nome)}</option>`).join('');$('pessoa').innerHTML=state.pessoas.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('');loadPessoaAtividades()}
function toggle(){const t=$('tipo').value;$('atividadeBox').classList.toggle('hidden',t!=='atividade');$('pessoaBox').classList.toggle('hidden',t!=='pessoa');$('pessoaAtividadeBox').classList.toggle('hidden',t!=='pessoa');$('trimestreBox').classList.toggle('hidden',t!=='trimestre');$('caixaBox').classList.toggle('hidden',t!=='trimestre'&&!$('mostrarSaldosOpc')?.checked);$('bancoBox').classList.toggle('hidden',t!=='trimestre'&&!$('mostrarSaldosOpc')?.checked);$('saldosOpcionaisBox').classList.toggle('hidden',t==='trimestre')}
function loadPessoaAtividades(){const p=$('pessoa').value;const ids=[...new Set(state.movimentos.filter(m=>m.pessoa_id===p&&m.atividade_id).map(m=>m.atividade_id))];$('atividadePessoa').innerHTML='<option value="todas">Todas</option>'+ids.map(id=>{const a=state.atividades.find(x=>x.id===id);return `<option value="${id}">${esc(a?a.nome:'Sem atividade')}</option>`}).join('')}
function filtroEstado(ms){const e=$('estado').value;return e==='todos'?ms:ms.filter(m=>m.estado_validacao===e)}
function rec(ms){return ms.filter(m=>m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0)}
function pag(ms){return ms.filter(m=>m.tipo==='pagamento').reduce((s,m)=>s+Number(m.valor||0),0)}
function origem(m){return (m.origem||'caixa').toLowerCase()}
function saldos(ms){const ci=Number($('caixa').value||0),bi=Number($('banco').value||0);const mc=ms.filter(m=>origem(m)==='caixa');const mb=ms.filter(m=>origem(m)==='banco');const cf=ci+rec(mc)-pag(mc);const bf=bi+rec(mb)-pag(mb);return `<h3>Saldos caixa/banco</h3><div class="box"><p><b>Caixa inicial:</b> ${euro(ci)} | <b>Caixa final:</b> ${euro(cf)}</p><p><b>Banco inicial:</b> ${euro(bi)} | <b>Banco final:</b> ${euro(bf)}</p><p><b>Saldo inicial total:</b> ${euro(ci+bi)} | <b>Saldo final total:</b> ${euro(cf+bf)}</p></div>`}
function gerar(){toggle();const t=$('tipo').value;if(t==='atividade')relAtividade();if(t==='pessoa')relPessoa();if(t==='trimestre')relTrimestre()}
function relAtividade(){const a=state.atividades.find(x=>x.id===$('atividade').value);if(!a)return;let ms=filtroEstado(state.movimentos.filter(m=>m.atividade_id===a.id));const pessoas=state.pessoas.filter(p=>p.secao===(a.secao_origem||a.secao));let html=`<h2>Relatório Atividade</h2><p><b>${esc(a.nome)}</b></p><p>${esc(a.tipo||'')} | ${trim(a.data_inicio)} | ${a.data_inicio||''} a ${a.data_fim||''}</p><h3>Pessoas da atividade</h3><table><tr><th>Pessoa</th><th>Presença</th><th>Recebido</th><th>Estado</th></tr>${pessoas.map(p=>{const pr=state.presencas.find(x=>x.pessoa_id===p.id&&x.atividade_id===a.id);const total=ms.filter(m=>m.pessoa_id===p.id&&m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0);return `<tr><td>${esc(p.nome)}</td><td>${esc(pr?pr.estado:'pendente')}</td><td>${euro(total)}</td><td>${total>=Number(a.valor_padrao||0)?'Pago':total>0?'Parcial':'Não pago'}</td></tr>`}).join('')}</table><h3>Movimentos associados à atividade</h3>${movTable(ms)}${subtotais(ms)}`;if($('mostrarSaldosOpc').checked)html+=saldos(ms);$('output').innerHTML=html}
function relPessoa(){const p=state.pessoas.find(x=>x.id===$('pessoa').value);if(!p)return;let ms=state.movimentos.filter(m=>m.pessoa_id===p.id);if($('atividadePessoa').value!=='todas')ms=ms.filter(m=>m.atividade_id===$('atividadePessoa').value);ms=filtroEstado(ms);const prs=state.presencas.filter(pr=>pr.pessoa_id===p.id&&($('atividadePessoa').value==='todas'||pr.atividade_id===$('atividadePessoa').value));let html=`<h2>Relatório Pessoa</h2><p><b>${esc(p.nome)}</b> | ${esc(p.secao)}</p><h3>Presenças associadas</h3><table><tr><th>Atividade</th><th>Data</th><th>Trimestre</th><th>Presença</th></tr>${prs.map(pr=>{const a=state.atividades.find(x=>x.id===pr.atividade_id);return `<tr><td>${esc(a?.nome||'Sem atividade')}</td><td>${a?.data_inicio||''}</td><td>${trim(a?.data_inicio)}</td><td>${esc(pr.estado)}</td></tr>`}).join('')||'<tr><td colspan="4">Sem presenças registadas.</td></tr>'}</table><h3>Pagamentos/recebimentos/pagamentos associados à pessoa</h3>${movTable(ms)}${subtotais(ms)}`;if($('mostrarSaldosOpc').checked)html+=saldos(ms);$('output').innerHTML=html}
function relTrimestre(){const tr=$('trimestre').value;const acts=state.atividades.filter(a=>trim(a.data_inicio)===tr);let ms=state.movimentos.filter(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);return a?trim(a.data_inicio)===tr:trim(dataMov(m))===tr});ms=filtroEstado(ms);const semAtividade=ms.filter(m=>!m.atividade_id||!state.atividades.some(a=>a.id===m.atividade_id));$('output').innerHTML=`<h2>Relatório ${tr}</h2><h3>Saldos iniciais e finais</h3>${saldos(ms)}<h3>Subtotais por tipo de movimento SIIC</h3>${siicTable(ms)}<h3>Movimentos do trimestre</h3>${movTable(ms)}<h3>Movimentos sem atividade associada</h3>${movTable(semAtividade)}${subtotais(ms)}`}
function siicTable(ms){const tipos=[...new Set(ms.map(m=>m.tipo_movimento||'Sem tipo SIIC'))].sort();return `<table><tr><th>Tipo SIIC</th><th>Recebimentos</th><th>Pagamentos</th><th>Total líquido</th></tr>${tipos.map(t=>{const tm=ms.filter(m=>(m.tipo_movimento||'Sem tipo SIIC')===t);return `<tr><td>${esc(t)}</td><td>${euro(rec(tm))}</td><td>${euro(pag(tm))}</td><td>${euro(rec(tm)-pag(tm))}</td></tr>`}).join('')}</table>`}
function movTable(ms){return `<table><tr><th>Data</th><th>Atividade</th><th>Pessoa</th><th>Tipo</th><th>SIIC</th><th>Estado</th><th>Origem</th><th>Descrição</th><th>Valor</th></tr>${ms.map(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);const p=state.pessoas.find(x=>x.id===m.pessoa_id);return `<tr><td>${esc(dataMov(m))}</td><td>${esc(a?a.nome:'Sem atividade')}</td><td>${esc(p?p.nome:'-')}</td><td>${esc(m.tipo||'')}</td><td>${esc(m.tipo_movimento||'')}</td><td>${esc(m.estado_validacao||'')}</td><td>${esc(m.origem||'caixa')}</td><td>${esc(m.descricao||'')}</td><td>${euro(m.valor)}</td></tr>`}).join('')||'<tr><td colspan="9">Sem movimentos.</td></tr>'}</table>`}
function subtotais(ms){return `<h3>Totais</h3><div class="box"><p><b>Recebimentos:</b> ${euro(rec(ms))}</p><p><b>Pagamentos:</b> ${euro(pag(ms))}</p><p><b>Total líquido:</b> ${euro(rec(ms)-pag(ms))}</p></div>`}
init()
</script>
</body>
</html>
