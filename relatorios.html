<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Relatórios CNE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--azul:#003366;--sec:#0b4f2f;--fundo:#f4f7fb;--texto:#1f2937;--suave:#f8fafc}*{box-sizing:border-box}body{font-family:Arial,Helvetica,sans-serif;background:var(--fundo);padding:20px;color:var(--texto);margin:0}.card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;box-shadow:0 4px 12px #0001}select,input,textarea,button{padding:10px;margin:5px 0;width:100%;border:1px solid #d0d7e2;border-radius:8px}textarea{min-height:120px}button{background:var(--azul);color:#fff;border:0;font-weight:bold;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.hidden{display:none}.muted{color:#6b7280;font-size:.9rem}.box{background:var(--suave);border:1px solid #e5e7eb;border-radius:8px;padding:8px;margin:8px 0}.report{background:#fff;border-top:10px solid var(--sec);padding:14px;border-radius:10px}.rhead{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center;border-bottom:2px solid var(--sec);padding-bottom:8px;margin-bottom:10px}.rhead h1{font-size:20px;margin:0;color:var(--sec)}.rhead h2{font-size:15px;margin:3px 0 0}.stamp{text-align:right;font-size:11px;color:#374151}.brand-img{max-width:64px;max-height:64px;object-fit:contain}.brand-placeholder{width:64px;height:64px;border:1px solid #d1d5db;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6b7280;font-size:10px;text-align:center}.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:6px;margin:8px 0}.meta div{border:1px solid #e5e7eb;background:#f8fafc;border-radius:6px;padding:6px;font-size:12px}.meta b{display:block;color:var(--sec)}h3{font-size:14px;margin:12px 0 6px;color:var(--sec)}table{width:100%;border-collapse:collapse;margin:6px 0 12px;font-size:12px}th,td{border:1px solid #d7dde7;padding:5px;vertical-align:top;word-break:break-word}th{background:#eef2f7;color:#111827}.totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.totals .box p{margin:3px 0}.nowrap{white-space:nowrap}.right{text-align:right}@page{size:A4 landscape;margin:8mm}@media print{body{background:#fff;padding:0}.no-print{display:none}.card{box-shadow:none;border:0;padding:0;margin:0}.report{border-radius:0;border-top:8px solid var(--sec);padding:0}.rhead{break-inside:avoid}.box,.meta div,tr{break-inside:avoid}table{font-size:9.2pt;margin-bottom:8px}th,td{padding:3px 4px}h3{font-size:11pt;break-after:avoid}.muted{display:none}}
</style>
</head>
<body>
<div class="card no-print">
<h1>Relatórios CNE</h1>
<div class="grid">
<div><label>Âmbito do relatório</label><select id="relScope" onchange="refresh();gerar()"><option value="Agrupamento">Agrupamento</option><option value="Alcateia">Alcateia</option><option value="Expedição">Expedição</option><option value="Comunidade">Comunidade</option><option value="Clã">Clã</option></select></div>
<div><label>Tipo relatório</label><select id="tipo" onchange="toggle();gerar()"><option value="atividade">Atividade</option><option value="pessoa">Pessoa</option><option value="trimestre">Trimestre</option></select></div>
<div id="atividadeBox"><label>Atividade</label><select id="atividade" onchange="gerar()"></select></div>
<div id="pessoaBox" class="hidden"><label>Pessoa</label><select id="pessoa" onchange="loadPessoaAtividades();gerar()"></select></div>
<div id="pessoaAtividadeBox" class="hidden"><label>Atividade da pessoa</label><select id="atividadePessoa" onchange="gerar()"><option value="todas">Todas</option></select></div>
<div id="trimestreBox" class="hidden"><label>Trimestre</label><select id="trimestre" onchange="gerar()"><option>1º Trimestre</option><option>2º Trimestre</option><option>3º Trimestre</option><option>4º Trimestre</option></select></div>
<div><label>Estado movimentos</label><select id="estado" onchange="gerar()"><option value="todos">Todos</option><option value="rascunho">Rascunho</option><option value="por_validar">Por validar</option><option value="validado">Validado</option></select></div>
<div id="saldosOpcionaisBox"><label><input id="mostrarSaldosOpc" type="checkbox" onchange="gerar()"> Mostrar saldos também neste relatório</label></div>
</div>
<button onclick="window.print()">Imprimir / PDF</button>
<p class="muted">Relatórios de agrupamento usam verde escuro. Imagens/logótipos e tipos SIIC podem ser configurados abaixo.</p>
</div>
<div class="card no-print">
<h2>Configuração</h2>
<div class="grid"><div><label>Caixa inicial</label><input id="cfgCaixa" type="number" step="0.01" value="0"></div><div><label>Banco inicial</label><input id="cfgBanco" type="number" step="0.01" value="0"></div><div><label>Referência</label><input id="cfgData" type="date"></div><div><label>Imagem para o âmbito selecionado</label><input id="cfgImg" type="file" accept="image/*" onchange="loadImage(event)"></div></div>
<div class="grid"><div><label>Tipos SIIC do âmbito selecionado</label><textarea id="cfgTipos" placeholder="Um tipo por linha"></textarea></div></div>
<button onclick="saveConfig();gerar()">Guardar configuração</button><p class="muted" id="cfgStatus"></p>
</div>
<div class="card" id="output"></div>
<script>
const db=supabase.createClient('https://ebyovpnqlgjrseudaqet.supabase.co','sb_publishable_umMHXkrCZk-VM2oKncUjAg_zqx_NDUN');
const state={pessoas:[],atividades:[],movimentos:[],presencas:[],config:{caixa:0,banco:0,data:'',images:{},tipos:{}}};
const secoes=['Alcateia','Expedição','Comunidade','Clã'];
const defaultTipos={Agrupamento:['Água','Anuidade Cartão MB','Atividades Agrupamento','Atividades Financeiras Agrupamento','Censos','Censos e Seguros','Compras DMF','Comunicações','Doações','Eletricidade','Formação','Jóias','Manutenção','Material Secretaria','Mov. Tesouraria Agrupamento','Outros Agrupamento','Quotas Agrupamento'],Alcateia:['Caçadas','Atividades Financeiras Alcateia','Quotas Alcateia','Compras DMF','Doações','Material Didático Alcateia','Mov. Tesouraria','Outros Alcateia'],Expedição:['Aventuras','Atividades Financeiras Expedição','Quotas Expedição','Compras DMF','Doações','Material Didático Expedição','Mov. Tesouraria','Reuniões Semanais Exp.','Outros Expedição'],Comunidade:['Empreendimentos','Atividades Financeiras Comunidade','Quotas Comunidade','Compras DMF','Doações','Material Didático Comunidade','Mov. Tesouraria','Outros Comunidade'],Clã:['Caminhadas','Atividades Financeiras Clã','Quotas Clã','Compras DMF','Doações','Material Didático Clã','Mov. Tesouraria','Outros Clã']};
const secColors={Agrupamento:'#0b4f2f',Alcateia:'#f6c343',Expedição:'#2e8b57',Comunidade:'#2563eb',Clã:'#dc2626'};
function euro(v){return Number(v||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR'})}function $(i){return document.getElementById(i)}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function relScope(){return $('relScope')?.value||'Agrupamento'}function isAgr(){return relScope()==='Agrupamento'}
function loadConfig(){try{state.config=Object.assign(state.config,JSON.parse(localStorage.getItem('cne_report_config')||'{}'))}catch(e){};state.config.images=state.config.images||{};state.config.tipos=state.config.tipos||{};syncConfigUI()}
function syncConfigUI(){const s=relScope();$('cfgCaixa').value=state.config.caixa||0;$('cfgBanco').value=state.config.banco||0;$('cfgData').value=state.config.data||'';$('cfgTipos').value=(state.config.tipos[s]||defaultTipos[s]||[]).join('\n');updateCfgStatus()}
function saveConfig(){const s=relScope();state.config.caixa=Number($('cfgCaixa').value||0);state.config.banco=Number($('cfgBanco').value||0);state.config.data=$('cfgData').value||'';state.config.tipos[s]=$('cfgTipos').value.split('\n').map(x=>x.trim()).filter(Boolean);localStorage.setItem('cne_report_config',JSON.stringify(state.config));updateCfgStatus()}
function loadImage(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{state.config.images[relScope()]=r.result;localStorage.setItem('cne_report_config',JSON.stringify(state.config));gerar();updateCfgStatus()};r.readAsDataURL(f)}
function updateCfgStatus(){if($('cfgStatus'))$('cfgStatus').innerText=`Configuração ativa: ${relScope()} | Caixa ${euro(state.config.caixa||0)} | Banco ${euro(state.config.banco||0)}${state.config.images?.[relScope()]?' | imagem definida':''}`}
function dataMov(m){const a=state.atividades.find(x=>x.id===m.atividade_id);return m.data_operacao||m.data||m.created_at?.slice(0,10)||a?.data_inicio||''}function trim(d){if(!d)return'';const m=new Date(d).getMonth()+1;if(m>=10)return'1º Trimestre';if(m<=3)return'2º Trimestre';if(m<=6)return'3º Trimestre';return'4º Trimestre'}function setSec(sec){document.documentElement.style.setProperty('--sec',secColors[sec]||secColors.Agrupamento)}
function header(titulo,sub,sec='Agrupamento'){setSec(sec);const img=state.config.images?.[sec];const logo=img?`<img class="brand-img" src="${img}">`:`<div class="brand-placeholder">imagem<br>${esc(sec)}</div>`;return `<div class="report"><div class="rhead"><div>${logo}</div><div><h1>${esc(titulo)}</h1><h2>${esc(sub||'')}</h2></div><div class="stamp"><b>Corpo Nacional de Escutas</b><br>${esc(sec)}<br>${new Date().toLocaleDateString('pt-PT')}</div></div>`}
function meta(items){return `<div class="meta">${items.map(i=>`<div><b>${esc(i[0])}</b>${i[1]}</div>`).join('')}</div>`}
function secMov(m){const a=state.atividades.find(x=>x.id===m.atividade_id);return m.secao_origem||a?.secao_origem||a?.secao||'Agrupamento'}
function scopeActivities(){const s=relScope();return state.atividades.filter(a=>isAgr()?((a.conta_financeira||a.ambito)==='agrupamento'||(a.secao_origem||a.secao)==='Agrupamento'):(a.secao_origem||a.secao)===s&&((a.conta_financeira||'secao')!=='agrupamento'))}
function scopeMovimentos(ms=state.movimentos){const s=relScope();return ms.filter(m=>isAgr()?((m.conta_financeira||m.ambito)==='agrupamento'||secMov(m)==='Agrupamento'):(secMov(m)===s&&((m.conta_financeira||'secao')!=='agrupamento')))}
async function init(){loadConfig();for(const t of ['pessoas','atividades','movimentos','presencas']){const r=await db.from(t).select('*');state[t]=r.data||[]}refresh();gerar()}
function refresh(){syncConfigUI();renderSelectors();toggle()}
function renderSelectors(){const acts=scopeActivities();$('atividade').innerHTML=acts.map(a=>`<option value="${a.id}">${esc(a.nome)}</option>`).join('');const s=relScope();const pessoas=isAgr()?state.pessoas:state.pessoas.filter(p=>p.secao===s);$('pessoa').innerHTML=pessoas.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('');loadPessoaAtividades()}
function toggle(){const t=$('tipo').value;$('atividadeBox').classList.toggle('hidden',t!=='atividade');$('pessoaBox').classList.toggle('hidden',t!=='pessoa');$('pessoaAtividadeBox').classList.toggle('hidden',t!=='pessoa');$('trimestreBox').classList.toggle('hidden',t!=='trimestre');$('saldosOpcionaisBox').classList.toggle('hidden',t==='trimestre')}
function loadPessoaAtividades(){const p=$('pessoa').value;const scoped=scopeMovimentos(state.movimentos);const ids=[...new Set(scoped.filter(m=>m.pessoa_id===p&&m.atividade_id).map(m=>m.atividade_id))];$('atividadePessoa').innerHTML='<option value="todas">Todas</option>'+ids.map(id=>{const a=state.atividades.find(x=>x.id===id);return `<option value="${id}">${esc(a?a.nome:'Sem atividade')}</option>`}).join('')}
function filtroEstado(ms){const e=$('estado').value;return e==='todos'?ms:ms.filter(m=>m.estado_validacao===e)}function rec(ms){return ms.filter(m=>m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0)}function pag(ms){return ms.filter(m=>m.tipo==='pagamento').reduce((s,m)=>s+Number(m.valor||0),0)}function origem(m){return (m.origem||'caixa').toLowerCase()}
function saldos(ms){const ci=Number(state.config.caixa||0),bi=Number(state.config.banco||0);const mc=ms.filter(m=>origem(m)==='caixa');const mb=ms.filter(m=>origem(m)==='banco');const cf=ci+rec(mc)-pag(mc);const bf=bi+rec(mb)-pag(mb);return `<h3>Saldos caixa/banco</h3><div class="totals"><div class="box"><p><b>Caixa inicial:</b> ${euro(ci)}</p><p><b>Caixa final:</b> ${euro(cf)}</p></div><div class="box"><p><b>Banco inicial:</b> ${euro(bi)}</p><p><b>Banco final:</b> ${euro(bf)}</p></div><div class="box"><p><b>Saldo inicial total:</b> ${euro(ci+bi)}</p><p><b>Saldo final total:</b> ${euro(cf+bf)}</p></div>${state.config.data?`<div class="box"><p><b>Referência:</b> ${state.config.data}</p></div>`:''}</div>`}
function gerar(){const t=$('tipo').value;if(t==='atividade')relAtividade();if(t==='pessoa')relPessoa();if(t==='trimestre')relTrimestre()}
function relAtividade(){const a=state.atividades.find(x=>x.id===$('atividade').value);if(!a)return $('output').innerHTML=header('Relatório de Atividade','Sem atividade',relScope())+'</div>';let ms=filtroEstado(scopeMovimentos(state.movimentos.filter(m=>m.atividade_id===a.id)));const sec=isAgr()?'Agrupamento':relScope();const pessoas=isAgr()?state.pessoas.filter(p=>ms.some(m=>m.pessoa_id===p.id)):state.pessoas.filter(p=>p.secao===relScope());let html=header('Relatório de Atividade',a.nome,sec)+meta([['Relatório',esc(sec)],['Tipo SIIC',esc(a.tipo||'')],['Trimestre',trim(a.data_inicio)],['Datas',`${a.data_inicio||''} a ${a.data_fim||''}`],['Âmbito',esc(a.ambito||'secao')],['Conta',esc(a.conta_financeira||'secao')]])+`<h3>Pessoas da atividade</h3><table><tr><th>Secção</th><th>Pessoa</th><th>Presença</th><th>Recebido</th><th>Estado</th></tr>${pessoas.map(p=>{const pr=state.presencas.find(x=>x.pessoa_id===p.id&&x.atividade_id===a.id);const total=ms.filter(m=>m.pessoa_id===p.id&&m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0);return `<tr><td>${esc(p.secao)}</td><td>${esc(p.nome)}</td><td>${esc(pr?pr.estado:'pendente')}</td><td class="right nowrap">${euro(total)}</td><td>${total>=Number(a.valor_padrao||0)?'Pago':total>0?'Parcial':'Não pago'}</td></tr>`}).join('')}</table><h3>Movimentos associados à atividade</h3>${movTable(ms)}${isAgr()?secSubtotals(ms):''}${subtotais(ms)}`;if($('mostrarSaldosOpc').checked)html+=saldos(ms);$('output').innerHTML=html+'</div>'}
function relPessoa(){const p=state.pessoas.find(x=>x.id===$('pessoa').value);if(!p)return;let ms=scopeMovimentos(state.movimentos.filter(m=>m.pessoa_id===p.id));if($('atividadePessoa').value!=='todas')ms=ms.filter(m=>m.atividade_id===$('atividadePessoa').value);ms=filtroEstado(ms);const prs=state.presencas.filter(pr=>pr.pessoa_id===p.id&&($('atividadePessoa').value==='todas'||pr.atividade_id===$('atividadePessoa').value));let html=header('Relatório de Pessoa',p.nome,p.secao)+meta([['Relatório',esc(relScope())],['Secção',esc(p.secao)],['Subgrupo',esc(p.subgrupo||'—')],['Filtro atividade',$('atividadePessoa').value==='todas'?'Todas':esc(state.atividades.find(a=>a.id===$('atividadePessoa').value)?.nome||'—')]])+`<h3>Presenças associadas</h3><table><tr><th>Atividade</th><th>Data</th><th>Trimestre</th><th>Presença</th></tr>${prs.map(pr=>{const a=state.atividades.find(x=>x.id===pr.atividade_id);return `<tr><td>${esc(a?.nome||'Sem atividade')}</td><td>${a?.data_inicio||''}</td><td>${trim(a?.data_inicio)}</td><td>${esc(pr.estado)}</td></tr>`}).join('')||'<tr><td colspan="4">Sem presenças registadas.</td></tr>'}</table><h3>Movimentos associados à pessoa</h3>${movTable(ms)}${subtotais(ms)}`;if($('mostrarSaldosOpc').checked)html+=saldos(ms);$('output').innerHTML=html+'</div>'}
function relTrimestre(){const tr=$('trimestre').value;let ms=scopeMovimentos(state.movimentos.filter(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);return a?trim(a.data_inicio)===tr:trim(dataMov(m))===tr}));ms=filtroEstado(ms);const acts=scopeActivities().filter(a=>trim(a.data_inicio)===tr);const semAtividade=ms.filter(m=>!m.atividade_id||!state.atividades.some(a=>a.id===m.atividade_id));const sec=relScope();$('output').innerHTML=header('Relatório de Trimestre',`${tr} — ${sec}`,sec)+meta([['Relatório',esc(sec)],['Movimentos',ms.length],['Atividades',acts.length],['Recebimentos',euro(rec(ms))],['Pagamentos',euro(pag(ms))],['Líquido',euro(rec(ms)-pag(ms))]])+saldos(ms)+(isAgr()?`<h3>Subtotais por secção</h3>${secSubtotals(ms)}<h3>Movimentos próprios do agrupamento</h3>${movTable(ms.filter(m=>secMov(m)==='Agrupamento'))}`:'')+`<h3>Subtotais por tipo de movimento SIIC</h3>${siicTable(ms)}<h3>Movimentos do trimestre</h3>${movTable(ms)}<h3>Movimentos sem atividade associada</h3>${movTable(semAtividade)}${subtotais(ms)}</div>`}
function secSubtotals(ms){const rows=secoes.concat(['Agrupamento']).map(s=>{const sm=ms.filter(m=>secMov(m)===s);if(!sm.length&&s!=='Agrupamento')return '';return `<tr><td>${esc(s)}</td><td class="right nowrap">${euro(rec(sm))}</td><td class="right nowrap">${euro(pag(sm))}</td><td class="right nowrap">${euro(rec(sm)-pag(sm))}</td></tr>`}).join('');return `<table><tr><th>Secção / Origem</th><th>Recebimentos</th><th>Pagamentos</th><th>Total líquido</th></tr>${rows}</table>`}
function siicTable(ms){const tipos=[...new Set(ms.map(m=>m.tipo_movimento||'Sem tipo SIIC'))].sort();return `<table><tr><th>Tipo SIIC</th><th>Recebimentos</th><th>Pagamentos</th><th>Total líquido</th></tr>${tipos.map(t=>{const tm=ms.filter(m=>(m.tipo_movimento||'Sem tipo SIIC')===t);return `<tr><td>${esc(t)}</td><td class="right nowrap">${euro(rec(tm))}</td><td class="right nowrap">${euro(pag(tm))}</td><td class="right nowrap">${euro(rec(tm)-pag(tm))}</td></tr>`}).join('')}</table>`}
function movTable(ms){return `<table><tr><th>Data</th><th>Origem</th><th>Atividade</th><th>Pessoa</th><th>Tipo</th><th>SIIC</th><th>Estado</th><th>Conta</th><th>Descrição</th><th>Valor</th></tr>${ms.map(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);const p=state.pessoas.find(x=>x.id===m.pessoa_id);return `<tr><td class="nowrap">${esc(dataMov(m))}</td><td>${esc(secMov(m))}</td><td>${esc(a?a.nome:'Sem atividade')}</td><td>${esc(p?p.nome:'-')}</td><td>${esc(m.tipo||'')}</td><td>${esc(m.tipo_movimento||'')}</td><td>${esc(m.estado_validacao||'')}</td><td>${esc(m.conta_financeira||m.origem||'caixa')}</td><td>${esc(m.descricao||'')}</td><td class="right nowrap">${euro(m.valor)}</td></tr>`}).join('')||'<tr><td colspan="10">Sem movimentos.</td></tr>'}</table>`}
function subtotais(ms){return `<h3>Totais</h3><div class="totals"><div class="box"><p><b>Recebimentos:</b> ${euro(rec(ms))}</p></div><div class="box"><p><b>Pagamentos:</b> ${euro(pag(ms))}</p></div><div class="box"><p><b>Total líquido:</b> ${euro(rec(ms)-pag(ms))}</p></div></div>`}
init()
</script>
</body>
</html>
