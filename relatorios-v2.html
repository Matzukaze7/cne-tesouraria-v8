option></select></div></div><label>Tipos de movimento SIIC</label><textarea id="cfgTipos" placeholder="Um tipo por linha"></textarea><button onclick="saveConfig();renderSelectors();gerar()">Guardar no Supabase</button><p class="muted" id="cfgStatus"></p></div><div class="card" id="output"></div><script>const db=supabase.createClient('https://ebyovpnqlgjrseudaqet.supabase.co','sb_publishable_umMHXkrCZk-VM2oKncUjAg_zqx_NDUN');const secoes=['Alcateia','Expedição','Comunidade','Clã'];const scopes=['Agrupamento','Alcateia','Expedição','Comunidade','Clã'];const secColors={Agrupamento:'#1E6042',Alcateia:'#F2C94C',Expedição:'#2B966C',Comunidade:'#155E75',Clã:'#BD242C'};const state={pessoas:[],atividades:[],movimentos:[],presencas:[],config:{saldos:{},images:{},brandMode:{},tipos:{}}};function $(i){return document.getElementById(i)}function euro(v){return Number(v||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR'})}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function relScope(){return $('relScope').value}function cfgScope(){return $('cfgScope').value}function isAgr(){return relScope()==='Agrupamento'}function idFor(prefix,s){return prefix+'_'+s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/ç/g,'c').replace(/ã/g,'a')}async function loadConfig(){state.config={saldos:{},images:{},brandMode:{},tipos:{}};const [saldos,brand,tipos]=await Promise.all([db.from('saldos_iniciais').select('*'),db.from('branding_config').select('*'),db.from('tipos_siic').select('*').eq('ativo',true).order('ordem',{ascending:true})]);(saldos.data||[]).forEach(r=>state.config.saldos[r.ambito]={caixa:Number(r.caixa||0),banco:Number(r.banco||0),data:r.data_referencia||''});(brand.data||[]).forEach(r=>{state.config.brandMode[r.ambito]=r.modo||'oficial';if(r.imagem_data_url)state.config.images[r.ambito]=r.imagem_data_url});(tipos.data||[]).forEach(r=>{(state.config.tipos[r.ambito] ||= []).push( NAL DE ESCUTAS']:[sec.toUpperCase(),'',''];return `<svg class="brand-svg" viewBox="0 0 430 110" preserveAspectRatio="xMinYMid meet" xmlns="http://www.w3.org/2000/svg"><circle cx="45" cy="45" r="34" fill="${c}" opacity=".95"/><path d="M45 12 C35 25 30 36 32 47 C23 42 14 45 9 54 C22 51 30 54 35 63 C33 75 25 86 16 94 C31 94 41 87 45 75 C49 87 59 94 74 94 C65 86 57 75 55 63 C60 54 68 51 81 54 C76 45 67 42 58 47 C60 36 55 25 45 12 Z" fill="#fff"/><path d="M24 58 H66 M45 39 V82" stroke="#BD242C" stroke-width="8" stroke-linecap="round"/><text x="100" y="37" font-size="22" font-weight="900" fill="${c}">${t[0]}</text><text x="100" y="63" font-size="18" font-weight="900" fill="${c}">${t[1]}</text><text x="100" y="84" font-size="11" fill="#2B966C" letter-spacing="2">${t[2]}</text></svg>`}function logoHtml(sec){const mode=state.config.brandMode[sec]||'oficial';const img=state.config.images[sec];if(mode==='upload'&&img)return `<img class="brand" src="${img}">`;if(mode==='nenhuma')return '<div></div>';return officialMark(sec)}function setSec(sec){document.documentElement.style.setProperty('--sec',secColors[sec]||secColors.Agrupamento)}function header(titulo,sub,sec='Agrupamento'){setSec(sec);return `<div class="report"><div class="rhead"><div>${logoHtml(sec)}</div><div><h1>${esc(titulo)}</h1><h2>${esc(sub||'')}</h2></div><div class="stamp"><b>Corpo Nacional de Escutas</b><br>${esc(sec)}<br>${new Date().toLocaleDateString('pt-PT')}</div></div>`}function meta(items){return `<div class="meta">${items.map(i=>`<div><b>${esc(i[0])}</b>${i[1]}</div>`).join('')}</div>`}function dataMov(m){const a=state.atividades.find(x=>x.id===m.atividade_id);return m.data_operacao||m.data||m.created_at?.slice(0,10)||a?.data_inicio||''}function trim(d){if(!d)return'';const m=new Date(d).getMonth()+1;if(m>=10)return'1º Trimestre';if(m<=3)return'2º Trimestre';if(m<=6)return'3º Trimestre';return'4º Trimestre'}function secMov(m){const a=state.atividades.find(x=>x.id===m.atividade_id);return m.secao_origem||a?.secao_origem||a?.secao||'Agrupamento'}function isGroupEntity(x){return (x?.conta_financeira||x?.ambito)==='agrupamento'}function activityOrigin(a){return a?.secao_origem||a?.secao||'Agrupamento'}function scopeActivities(){const s=relScope();return state.atividades.filter(a=>isAgr()?isGroupEntity(a)||activityOrigin(a)==='Agrupamento':activityOrigin(a)===s&&!isGroupEntity(a))}function scopeMovimentos(ms=state.movimentos){const s=relScope();return ms.filter(m=>isAgr()?isGroupEntity(m)||secMov(m)==='Agrupamento':secMov(m)===s&&!isGroupEntity(m))}function pessoaModoOk(m){const modo=$('pessoaModo')?.value||'todas';if(modo==='todas')return true;return modo==='agrupamento'?isGroupEntity(m):!isGroupEntity(m)}async function init(){await loadConfig();for(const t of ['pessoas','atividades','movimentos','presencas']){const r=await db.from(t).select('*');state[t]=r.data||[]}renderSelectors();toggle();gerar();['saldos_iniciais','branding_config','tipos_siic'].forEach(t=>db.channel('cfg_'+t).on('postgres_changes',{event:'*',schema:'public',table:t},async()=>{await loadConfig();gerar()}).subscribe())}function renderSelectors(){const acts=scopeActivities();$('atividade').innerHTML=acts.map(a=>`<option value="${a.id}">${esc(a.nome)}</option>`).join('');const ps=isAgr()?state.pessoas:state.pessoas.filter(p=>p.secao===relScope());$('pessoa').innerHTML=ps.map(p=>`<option value="${p.id}">${esc(p.nome)}</option>`).join('');loadPessoaAtividades()}function toggle(){const t=$('tipo').value;$('atividadeBox').classList.toggle('hidden',t!=='atividade');$('pessoaBox').classList.toggle('hidden',t!=='pessoa');$('pessoaModoBox').classList.toggle('hidden',t!=='pessoa');$('pessoaAtividadeBox').classList.toggle('hidden',t!=='pessoa');$('trimestreBox').classList.toggle('hidden',t!=='trimestre');$('saldosOpcionaisBox').classList.toggle('hidden',t==='trimestre')}function loadPessoaAtividades(){const p=$('pessoa').value;const ids=[...new Set(scopeMovimentos().filter(m=>m.pessoa_id===p&&m.atividade_id&&pessoaModoOk(m)).map(m=>m.atividade_id))];$('atividadePessoa').innerHTML='<option value="todas">Todas</option>'+ids.map(id=>{const a=state.atividades.find(x=>x.id===id);return `<option value="${id}">${esc(a?a.nome:'Sem atividade')}</option>`}).join('')}function filtroEstado(ms){const e=$('estado').value;return e==='todos'?ms:ms.filter(m=>m.estado_validacao===e)}function rec(ms){return ms.filter(m=>m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0)}function pag(ms){return ms.filter(m=>m.tipo==='pagamento').reduce((s,m)=>s+Number(m.valor||0),0)}function origem(m){return (m.origem||'caixa').toLowerCase()}function saldos(ms){const sal=state.config.saldos[relScope()]||{caixa:0,banco:0,data:''};const ci=+sal.caixa||0,bi=+sal.banco||0;const mc=ms.filter(m=>origem(m)==='caixa'),mb=ms.filter(m=>origem(m)==='banco');const cf=ci+rec(mc)-pag(mc),bf=bi+rec(mb)-pag(mb);return `<h3>Saldos caixa/banco</h3><div class="totals"><div class="box"><b>Caixa inicial:</b> ${euro(ci)}<br><b>Caixa final:</b> ${euro(cf)}</div><div class="box"><b>Banco inicial:</b> ${euro(bi)}<br><b>Banco final:</b> ${euro(bf)}</div><div class="box"><b>Saldo inicial total:</b> ${euro(ci+bi)}<br><b>Saldo final total:</b> ${euro(cf+bf)}</div>${sal.data?`<div class="box"><b>Referência:</b> ${sal.data}</div>`:''}</div>`}function gerar(){const t=$('tipo').value;if(t==='atividade')relAtividade();if(t==='pessoa')relPessoa();if(t==='trimestre')relTrimestre()}function relAtividade(){const a=state.atividades.find(x=>x.id===$('atividade').value);if(!a){$('output').innerHTML=header('Relatório de Atividade','Sem atividade',relScope())+'</div>';return}let ms=filtroEstado(scopeMovimentos(state.movimentos.filter(m=>m.atividade_id===a.id)));const origemAtividade=activityOrigin(a);const sec=isAgr()?'Agrupamento':origemAtividade;const ps=isAgr()?state.pessoas.filter(p=>ms.some(m=>m.pessoa_id===p.id)):state.pessoas.filter(p=>p.secao===origemAtividade);let html=header('Relatório de Atividade',a.nome,sec)+meta([['Relatório',esc(sec)],['Secção/origem',esc(origemAtividade)],['Tipo SIIC',esc(a.tipo||'')],['Trimestre',trim(a.data_inicio)],['Datas',`${a.data_inicio||''} a ${a.data_fim||''}`],['Local',esc(a.local||'')]])+`<h3>Pessoas da atividade - ${esc(origemAtividade)}</h3><table><tr><th>Pessoa</th><th>Presença</th><th>Recebido</th><th>Estado</th></tr>${ps.map(p=>{const pr=state.presencas.find(x=>x.pessoa_id===p.id&&x.atividade_id===a.id);const total=ms.filter(m=>m.pessoa_id===p.id&&m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0);return `<tr><td>${esc(p.nome)}</td><td>${esc(pr?pr.estado:'pendente')}</td><td class="right nowrap">${euro(total)}</td><td>${total>=Number(a.valor_padrao||0)?'Pago':total>0?'Parcial':'Não pago'}</td></tr>`}).join('')}</table><h3>Movimentos associados à atividade</h3>${movTable(ms)}${isAgr()?secSubtotals(ms):''}${subtotais(ms)}`;if($('mostrarSaldosOpc').checked)html+=saldos(ms);$('output').innerHTML=html+'</div>'}function relPessoa(){const p=state.pessoas.find(x=>x.id===$('pessoa').value);if(!p)return;let ms=scopeMovimentos(state.movimentos.filter(m=>m.pessoa_id===p.id&&pessoaModoOk(m)));if($('atividadePessoa').value!=='todas')ms=ms.filter(m=>m.atividade_id===$('atividadePessoa').value);ms=filtroEstado(ms);const actIds=new Set(ms.filter(m=>m.atividade_id).map(m=>m.atividade_id));const prs=state.presencas.filter(pr=>pr.pessoa_id===p.id&&($('atividadePessoa').value==='todas'?actIds.has(pr.atividade_id):pr.atividade_id===$('atividadePessoa').value));$('output').innerHTML=header('Relatório de Pessoa',p.nome,p.secao)+meta([['Relatório',esc(relScope())],['Secção',esc(p.secao)],['Filtro tipo',$('pessoaModo')?.selectedOptions?.[0]?.textContent||'Todas'],['Atividade',$('atividadePessoa').value==='todas'?'Todas':esc(state.atividades.find(a=>a.id===$('atividadePessoa').value)?.nome||'—')]])+`<h3>Presenças associadas</h3><table><tr><th>Atividade</th><th>Âmbito</th><th>Data</th><th>Trimestre</th><th>Presença</th></tr>${prs.map(pr=>{const a=state.atividades.find(x=>x.id===pr.atividade_id);return `<tr><td>${esc(a?.nome||'Sem atividade')}</td><td>${isGroupEntity(a)?'Agrupamento':'Secção'}</td><td>${a?.data_inicio||''}</td><td>${trim(a?.data_inicio)}</td><td>${esc(pr.estado)}</td></tr>`}).join('')||'<tr><td colspan="5">Sem presenças registadas.</td></tr>'}</table><h3>Movimentos associados à pessoa</h3>${movTable(ms)}${subtotais(ms)}${$('mostrarSaldosOpc').checked?saldos(ms):''}</div>`}function relTrimestre(){const tr=$('trimestre').value;let ms=scopeMovimentos(state.movimentos.filter(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);return a?trim(a.data_inicio)===tr:trim(dataMov(m))===tr}));ms=filtroEstado(ms);const acts=scopeActivities().filter(a=>trim(a.data_inicio)===tr);const semAtividade=ms.filter(m=>!m.atividade_id||!state.atividades.some(a=>a.id===m.atividade_id));const comAtividade=ms.filter(m=>m.atividade_id&&state.atividades.some(a=>a.id===m.atividade_id));$('output').innerHTML=header('Relatório de Trimestre',`${tr} — ${relScope()}`,relScope())+meta([['Relatório',esc(relScope())],['Movimentos',ms.length],['Atividades',acts.length],['Recebimentos',euro(rec(ms))],['Pagamentos',euro(pag(ms))],['Líquido',euro(rec(ms)-pag(ms))]])+saldos(ms)+(isAgr()?`<h3>Subtotais por secção</h3>${secSubtotals(ms)}<h3>Movimentos próprios do agrupamento</h3>${movTable(ms.filter(m=>secMov(m)==='Agrupamento'))}`:'')+`<h3>Subtotais por tipo de movimento SIIC</h3>${siicTable(ms)}<h3>Movimentos associados a atividades</h3>${movTable(comAtividade)}<h3>Movimentos administrativos sem atividade</h3>${movTableSemAtividade(semAtividade)}${subtotais(ms)}</div>`}function secSubtotals(ms){const rows=secoes.concat(['Agrupamento']).map(s=>{const sm=ms.filter(m=>secMov(m)===s);if(!sm.length&&s!=='Agrupamento')return '';return `<tr><td>${esc(s)}</td><td class="right nowrap">${euro(rec(sm))}</td><td class="right nowrap">${euro(pag(sm))}</td><td class="right nowrap">${euro(rec(sm)-pag(sm))}</td></tr>`}).join('');return `<table><tr><th>Secção/origem</th><th>Recebimentos</th><th>Pagamentos</th><th>Total líquido</th></tr>${rows}</table>`}function siicTable(ms){const tipos=[...new Set(ms.map(m=>m.tipo_movimento||'Sem tipo SIIC'))].sort();return `<table><tr><th>Tipo SIIC</th><th>Recebimentos</th><th>Pagamentos</th><th>Total líquido</th></tr>${tipos.map(t=>{const tm=ms.filter(m=>(m.tipo_movimento||'Sem tipo SIIC')===t);return `<tr><td>${esc(t)}</td><td class="right nowrap">${euro(rec(tm))}</td><td class="right nowrap">${euro(pag(tm))}</td><td class="right nowrap">${euro(rec(tm)-pag(tm))}</td></tr>`}).join('')}</table>`}function movTable(ms){return `<table><tr><th>Data</th><th>Origem</th><th>Atividade</th><th>Pessoa</th><th>Tipo</th><th>SIIC</th><th>Estado</th><th>Conta</th><th>Descrição</th><th>Valor</th></tr>${ms.map(m=>{const a=state.atividades.find(x=>x.id===m.atividade_id);const p=state.pessoas.find(x=>x.id===m.pessoa_id);return `<tr><td class="nowrap">${esc(dataMov(m))}</td><td>${esc(secMov(m))}</td><td>${esc(a?a.nome:'Sem atividade')}</td><td>${esc(p?p.nome:'-')}</td><td>${esc(m.tipo||'')}</td><td>${esc(m.tipo_movimento||'')}</td><td>${esc(m.estado_validacao||'')}</td><td>${esc(m.conta_financeira||m.origem||'caixa')}</td><td>${esc(m.descricao||'')}</td><td class="right nowrap">${euro(m.valor)}</td></tr>`}).join('')||'<tr><td colspan="10">Sem movimentos.</td></tr>'}</table>`}function movTableSemAtividade(ms){return `<table><tr><th>Data</th><th>Origem</th><th>Pessoa/Entidade</th><th>Tipo</th><th>SIIC</th><th>Estado</th><th>Conta</th><th>Descrição</th><th>Valor</th></tr>${ms.map(m=>{const p=state.pessoas.find(x=>x.id===m.pessoa_id);return `<tr><td class="nowrap">${esc(dataMov(m))}</td><td>${esc(secMov(m))}</td><td>${esc(p?p.nome:'-')}</td><td>${esc(m.tipo||'')}</td><td>${esc(m.tipo_movimento||'')}</td><td>${esc(m.estado_validacao||'')}</td><td>${esc(m.conta_financeira||m.origem||'caixa')}</td><td>${esc(m.descricao||'')}</td><td class="right nowrap">${euro(m.valor)}</td></tr>`}).join('')||'<tr><td colspan="9">Sem movimentos administrativos.</td></tr>'}</table>`}function subtotais(ms){return `<h3>Totais</h3><div class="totals"><div class="box"><b>Recebimentos:</b> ${euro(rec(ms))}</div><div class="box"><b>Pagamentos:</b> ${euro(pag(ms))}</div><div class="box"><b>Total líquido:</b> ${euro(rec(ms)-pag(ms))}</div></div>`}init();</script></body></html>
