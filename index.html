<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CNE Tesouraria</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--azul:#003366;--fundo:#f4f7fb;--verde:#198754;--cinza:#6b7280;--vermelho:#dc3545}*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:var(--fundo);margin:0;padding:1rem;color:#1f2937}.wrap{max-width:1200px;margin:auto}.card{background:white;border-radius:16px;padding:1rem;margin-bottom:1rem;box-shadow:0 4px 12px #0001}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}button{padding:.7rem 1rem;border-radius:10px;border:none;cursor:pointer;background:var(--azul);color:white;font-weight:700;margin:.15rem}button.secondary{background:var(--cinza)}button.success{background:var(--verde)}input,select{width:100%;padding:.7rem;margin:.35rem 0 1rem;border-radius:8px;border:1px solid #d0d7e2}label{font-weight:700}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e5e7eb;text-align:left;padding:.5rem}th{background:#eef2f7}.pill{display:inline-block;padding:.25rem .6rem;border-radius:99px;background:#eef2f7;margin:.15rem}.ok{background:#d1e7dd}.warn{background:#fff3cd}.bad{background:#f8d7da}.hidden{display:none}.small{font-size:.85rem;color:#6b7280}
</style>
</head>
<body>
<div class="wrap">
<div class="card"><h1>CNE Tesouraria</h1><div id="syncStatus" class="small">A preparar sincronização...</div><div><button onclick="show('inicio')">Início</button><button onclick="show('pessoas')">Pessoas</button><button onclick="show('atividades')">Atividades</button><button onclick="show('atividade')">Atividade em curso</button><button onclick="show('validar')">Validar</button><button onclick="show('contar')">Contar dinheiro</button><button onclick="show('relatorios')">Relatórios</button><button onclick="show('auditoria')">Auditoria</button></div></div>
<section id="inicio" class="view"></section><section id="pessoas" class="view hidden"></section><section id="atividades" class="view hidden"></section><section id="atividade" class="view hidden"></section><section id="validar" class="view hidden"></section><section id="contar" class="view hidden"></section><section id="relatorios" class="view hidden"></section><section id="auditoria" class="view hidden"></section>
</div>
<script>
const SUPABASE_URL='https://ebyovpnqlgjrseudaqet.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_umMHXkrCZk-VM2oKncUjAg_zqx_NDUN';
const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const channel=new BroadcastChannel('cne-sync');
const state={pessoas:[],atividades:[],presencas:[],movimentos:[],contagens:[],validacoes:[],auditoria:[],online:false};
const secoes=['Alcateia','Expedição','Comunidade','Clã'];
const tipos={Alcateia:['Caçadas','Quotas Alcateia','Compras DMF','Mov. Tesouraria','Atividades Financeiras Alcateia','Outros Alcateia'],Expedição:['Aventuras','Quotas Expedição','Compras DMF','Mov. Tesouraria','Reuniões Semanais Exp.','Atividades Financeiras Expedição','Outros Expedição'],Comunidade:['Empreendimentos','Quotas Pio 34','Compras DMF','Mov. Tesouraria','Atividades Financeiras Comunidade','Outros Comunidade'],Clã:['Caminhadas','Quotas Clã','Compras DMF','Mov. Tesouraria','Atividades Financeiras Clã','Outros Clã'],Agrupamento:['Atividade Agrupamento','Atividades Financeiras Agrupamento','Mov. Tesouraria Agrupamento','Outros Agrupamento']};
const notas=[50,20,10,5],moedas=[2,1,.5,.2,.1,.05,.02,.01];
channel.onmessage=()=>loadAll();
function euro(v){return Number(v||0).toLocaleString('pt-PT',{style:'currency',currency:'EUR'})}function $(id){return document.getElementById(id)}function by(arr,id){return state[arr].find(x=>x.id===id)}function opt(list,sel=''){return list.map(x=>`<option value="${x}" ${x===sel?'selected':''}>${x}</option>`).join('')}function getTipoLista(secao,ambito){return ambito==='agrupamento'?tipos.Agrupamento.concat(tipos[secao]||[]):tipos[secao]||[]}function updateActivityTypeOptions(){const secao=$('actSecao')?.value||'Expedição';const ambito=$('actAmbito')?.value||'secao';const type=$('actTipo');if(!type)return;const previous=type.value;const list=getTipoLista(secao,ambito);type.innerHTML=opt(list,list.includes(previous)?previous:list[0]);}
function saveLocal(){localStorage.setItem('cne_v9_local',JSON.stringify(state));channel.postMessage('updated')}function loadLocal(){const raw=localStorage.getItem('cne_v9_local');if(raw)Object.assign(state,JSON.parse(raw));renderAll()}async function init(){try{await db.auth.signInAnonymously();state.online=true;$('syncStatus').innerText='Ligado ao Supabase e sincronização ativa.';await loadAll()}catch(e){state.online=false;$('syncStatus').innerText='Modo offline/local.';loadLocal()}}async function loadTable(t){const {data,error}=await db.from(t).select('*').order('created_at',{ascending:false});if(error)throw error;state[t]=data||[]}async function loadAll(){if(!state.online)return loadLocal();try{for(const t of ['pessoas','atividades','presencas','movimentos','contagens','validacoes','auditoria'])await loadTable(t);saveLocal();renderAll()}catch(e){console.error(e);$('syncStatus').innerText='Erro online. A usar dados locais.';loadLocal()}}async function insert(t,row){if(!state.online)throw new Error('offline');const {error}=await db.from(t).insert(row);if(error)throw error}async function upsert(t,row){if(!state.online)throw new Error('offline');const {error}=await db.from(t).upsert(row);if(error)throw error}async function audit(tipo,entidade,detalhe){const row={id:crypto.randomUUID(),tipo,entidade,detalhe};state.auditoria.unshift(row);saveLocal();try{await insert('auditoria',row)}catch(e){}}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));$(id).classList.remove('hidden');renderAll()}function renderAll(){renderInicio();renderPessoas();renderAtividades();renderAtividade();renderValidar();renderContar();renderRelatorios();renderAuditoria()}function abertas(){return state.atividades.filter(a=>a.estado==='aberta')}function movTotal(f){return state.movimentos.filter(f).reduce((s,m)=>s+Number(m.valor||0),0)}
function renderInicio(){const oficial=movTotal(m=>m.estado_validacao==='validado'&&m.tipo==='recebimento')-movTotal(m=>m.estado_validacao==='validado'&&m.tipo==='pagamento');const previsto=movTotal(m=>['rascunho','por_validar','validado'].includes(m.estado_validacao)&&m.tipo==='recebimento')-movTotal(m=>['rascunho','por_validar','validado'].includes(m.estado_validacao)&&m.tipo==='pagamento');$('inicio').innerHTML=`<div class="grid"><div class="card"><h2>Resumo</h2><span class="pill ok">Saldo oficial: ${euro(oficial)}</span><span class="pill warn">Por confirmar: ${euro(previsto-oficial)}</span><span class="pill">Saldo previsto: ${euro(previsto)}</span><span class="pill bad">${state.movimentos.filter(m=>m.estado_validacao==='por_validar').length} por validar</span></div><div class="card"><h2>Regra financeira</h2><p><b>Secção:</b> mexe na caixa/banco da secção. <br><b>Agrupamento:</b> a secção lança, mas o dinheiro pertence ao agrupamento e é validado pelo agrupamento.</p></div></div>`}
function renderPessoas(){$('pessoas').innerHTML=`<div class="grid"><div class="card"><h2>Adicionar pessoa</h2><label>Nome</label><input id="nome"><label>Secção</label><select id="secao">${opt(secoes)}</select><label>Bando/Patrulha/Equipa/Tribo</label><input id="subgrupo"><button onclick="addPessoa()">Guardar pessoa</button></div><div class="card"><h2>Pessoas</h2><table><thead><tr><th>Nome</th><th>Secção</th><th>Subgrupo</th></tr></thead><tbody>${state.pessoas.map(p=>`<tr><td>${p.nome}</td><td>${p.secao}</td><td>${p.subgrupo||''}</td></tr>`).join('')}</tbody></table></div></div>`}async function addPessoa(){const nome=$('nome').value.trim(),secao=$('secao').value,subgrupo=$('subgrupo').value.trim();if(!nome)return alert('Nome obrigatório.');const row={id:crypto.randomUUID(),nome,secao,subgrupo,ativo:true};state.pessoas.unshift(row);saveLocal();renderAll();try{await insert('pessoas',row);await audit('criacao_pessoa',row.id,`Criada pessoa ${nome}`);await loadAll()}catch(e){alert('Guardado localmente.')}}
function renderAtividades(){const secao=$('actSecao')?.value||'Expedição',ambito=$('actAmbito')?.value||'secao';const tipoLista=getTipoLista(secao,ambito);$('atividades').innerHTML=`<div class="grid"><div class="card"><h2>Criar atividade</h2><label>Nome</label><input id="actNome"><label>Secção que lança/origem</label><select id="actSecao" onchange="updateActivityTypeOptions()">${opt(secoes,secao)}</select><label>Âmbito</label><select id="actAmbito" onchange="updateActivityTypeOptions()"><option value="secao" ${ambito==='secao'?'selected':''}>Secção</option><option value="agrupamento" ${ambito==='agrupamento'?'selected':''}>Agrupamento</option></select><label>Tipo SIIC</label><select id="actTipo">${opt(tipoLista)}</select><label>Data início</label><input id="actInicio" type="date"><label>Data fim</label><input id="actFim" type="date"><label>Local</label><input id="actLocal"><label>Valor padrão</label><input id="actValor" type="number" step="0.01" value="0"><button onclick="addAtividade()">Criar atividade</button></div><div class="card"><h2>Atividades</h2><table><thead><tr><th>Nome</th><th>Origem</th><th>Âmbito</th><th>Conta</th><th>Tipo</th><th>Valor</th></tr></thead><tbody>${state.atividades.map(a=>`<tr><td>${a.nome}</td><td>${a.secao_origem||a.secao}</td><td>${a.ambito||'secao'}</td><td>${a.conta_financeira||'secao'}</td><td>${a.tipo}</td><td>${euro(a.valor_padrao)}</td></tr>`).join('')}</tbody></table></div></div>`}
async function addAtividade(){const nome=$('actNome').value.trim(),secao=$('actSecao').value,ambito=$('actAmbito').value,tipo=$('actTipo').value,data_inicio=$('actInicio').value||null,data_fim=$('actFim').value||data_inicio,local=$('actLocal').value.trim(),valor_padrao=Number($('actValor').value||0);if(!nome)return alert('Nome obrigatório.');const row={id:crypto.randomUUID(),nome,secao,tipo,ambito,secao_origem:secao,conta_financeira:ambito==='agrupamento'?'agrupamento':'secao',validador_nivel:ambito==='agrupamento'?'agrupamento':'secao',data_inicio,data_fim,local,valor_padrao,estado:'aberta'};state.atividades.unshift(row);saveLocal();renderAll();try{await insert('atividades',row);await audit('criacao_atividade',row.id,`Criada atividade ${nome} (${ambito})`);await loadAll()}catch(e){alert('Atividade guardada localmente.')}}
function renderAtividade(){const acts=abertas(),a=acts.find(x=>x.id===$('atividadeSelect')?.value)||acts[0];if(!a){$('atividade').innerHTML='<div class="card"><h2>Sem atividade aberta</h2></div>';return}const pessoas=state.pessoas.filter(p=>p.ativo&&p.secao===(a.secao_origem||a.secao));$('atividade').innerHTML=`<div class="card"><h2>Atividade em curso</h2><select id="atividadeSelect" onchange="renderAtividade()">${acts.map(x=>`<option value="${x.id}" ${x.id===a.id?'selected':''}>${x.nome} — ${x.secao_origem||x.secao} — ${x.ambito||'secao'}</option>`).join('')}</select><p><b>${a.nome}</b> · ${a.tipo} · ${a.ambito||'secao'} · Conta: ${a.conta_financeira||'secao'}</p><table><thead><tr><th>Pessoa</th><th>Presença</th><th>Recebido</th><th>Ações</th></tr></thead><tbody>${pessoas.map(p=>rowPessoaAtividade(p,a)).join('')}</tbody></table><p><button class="success" onclick="sendDrafts('${a.id}')">Enviar rascunhos para validação</button></p></div>`}function rowPessoaAtividade(p,a){const pr=state.presencas.find(x=>x.pessoa_id===p.id&&x.atividade_id===a.id);const total=state.movimentos.filter(m=>m.pessoa_id===p.id&&m.atividade_id===a.id&&m.tipo==='recebimento').reduce((s,m)=>s+Number(m.valor||0),0);return `<tr><td>${p.nome}</td><td><select onchange="setPresenca('${p.id}','${a.id}',this.value)"><option value="pendente" ${!pr||pr.estado==='pendente'?'selected':''}>Pendente</option><option value="presente" ${pr?.estado==='presente'?'selected':''}>Presente</option><option value="ausente" ${pr?.estado==='ausente'?'selected':''}>Ausente</option><option value="justificado" ${pr?.estado==='justificado'?'selected':''}>Justificado</option></select></td><td>${euro(total)} / ${euro(a.valor_padrao)}</td><td><button onclick="addMovimento('${p.id}','${a.id}',${Number(a.valor_padrao||0)})">Recebeu ${euro(a.valor_padrao)}</button><button class="secondary" onclick="outroValor('${p.id}','${a.id}',${Number(a.valor_padrao||0)})">Outro valor</button></td></tr>`}async function setPresenca(pessoa_id,atividade_id,estado){const row={id:`${pessoa_id}_${atividade_id}`,pessoa_id,atividade_id,estado,estado_validacao:'rascunho'};const i=state.presencas.findIndex(x=>x.id===row.id);if(i>=0)state.presencas[i]=row;else state.presencas.unshift(row);saveLocal();renderAll();try{await upsert('presencas',row);await loadAll()}catch(e){}}function outroValor(p,a,padrao){const raw=prompt('Valor recebido agora',String(padrao));if(raw!==null){const v=Number(String(raw).replace(',','.'));if(!Number.isNaN(v)&&v>=0)addMovimento(p,a,v)}}async function addMovimento(pessoa_id,atividade_id,valor){const a=by('atividades',atividade_id);const row={id:crypto.randomUUID(),pessoa_id,atividade_id,tipo:'recebimento',tipo_movimento:a?.tipo||'',origem:'caixa',valor,estado_validacao:'rascunho',estado_siic:valor>=Number(a?.valor_padrao||0)?'Presente ou Entregue/Pago':'Presente ou Entregue/Por Pagar',descricao:'Dinheiro recebido (Recebimento SIIC)',ambito:a?.ambito||'secao',secao_origem:a?.secao_origem||a?.secao,conta_financeira:a?.conta_financeira||'secao',validador_nivel:a?.validador_nivel||'secao'};state.movimentos.unshift(row);saveLocal();renderAll();try{await insert('movimentos',row);await audit('criacao_movimento',row.id,`Recebimento ${euro(valor)} (${row.ambito})`);await loadAll()}catch(e){alert('Recebimento guardado localmente.')}}async function sendDrafts(atividade_id){const drafts=state.movimentos.filter(m=>m.atividade_id===atividade_id&&m.estado_validacao==='rascunho');for(const m of drafts){m.estado_validacao='por_validar';try{await upsert('movimentos',m)}catch(e){}}saveLocal();await audit('envio_validacao',atividade_id,`${drafts.length} movimentos enviados`);await loadAll();alert(`${drafts.length} registos enviados para validação.`)}
function renderValidar(){const scope=$('validationScope')?.value||'todos';const movs=state.movimentos.filter(m=>m.estado_validacao==='por_validar'&&(scope==='todos'||m.validador_nivel===scope));const counts=state.contagens.filter(c=>!['fechada','totalmente_associada'].includes(c.estado)&&Number(c.restante)>0);$('validar').innerHTML=`<div class="card"><h2>Validar movimentos</h2><label>Ver validações</label><select id="validationScope" onchange="renderValidar()"><option value="todos" ${scope==='todos'?'selected':''}>Todos</option><option value="secao" ${scope==='secao'?'selected':''}>Secção</option><option value="agrupamento" ${scope==='agrupamento'?'selected':''}>Agrupamento</option></select><table><thead><tr><th>Pessoa</th><th>Atividade</th><th>Âmbito</th><th>Origem</th><th>Conta</th><th>Valor</th><th>Contagem</th><th>Ação</th></tr></thead><tbody>${movs.map(m=>{const p=by('pessoas',m.pessoa_id),a=by('atividades',m.atividade_id);return `<tr><td>${p?.nome||''}</td><td>${a?.nome||''}</td><td>${m.ambito||'secao'}</td><td>${m.secao_origem||a?.secao||''}</td><td>${m.conta_financeira||'secao'}</td><td>${euro(m.valor)}</td><td><select id="cx-${m.id}"><option value="">Sem contagem</option>${counts.map(c=>`<option value="${c.id}">${c.id} · ${euro(c.restante)}</option>`).join('')}</select></td><td><button class="success" onclick="validateMov('${m.id}')">Validar</button></td></tr>`}).join('')||'<tr><td colspan="8">Sem movimentos por validar.</td></tr>'}</tbody></table></div>`}async function validateMov(id){const m=by('movimentos',id);if(!m)return;const cxid=$(`cx-${id}`).value;let metodo='manual';if(cxid){const cx=by('contagens',cxid);if(cx&&Number(cx.restante)>=Number(m.valor)){cx.total_associado=Number(cx.total_associado||0)+Number(m.valor||0);cx.restante=Number(cx.total_contado||0)-Number(cx.total_associado||0);cx.estado=cx.restante===0?'totalmente_associada':'parcialmente_associada';metodo='numerario';try{await upsert('contagens',cx)}catch(e){}}else if(!confirm('A contagem não tem valor suficiente. Validar manualmente?'))return}m.estado_validacao='validado';m.metodo_validacao=metodo;m.contagem_id=metodo==='numerario'?cxid:null;try{await upsert('movimentos',m);await insert('validacoes',{id:crypto.randomUUID(),movimento_id:m.id,metodo_validacao:metodo,contagem_id:m.contagem_id,checklist:{dinheiro:true,valor:true,pessoa:true,atividade:true}});await audit('validacao_movimento',m.id,`Validado ${euro(m.valor)} (${metodo})`);await loadAll()}catch(e){alert('Validação guardada localmente.')}}
function cashInputs(type,arr){return arr.map(v=>`<tr><td>${euro(v)}</td><td><input type="number" min="0" value="0" data-cash-${type}="${v}" oninput="cashPreview()"></td><td id="line-${type}-${String(v).replace('.','_')}">${euro(0)}</td></tr>`).join('')}function cashPreview(){let total=0;document.querySelectorAll('[data-cash-notas],[data-cash-moedas]').forEach(i=>{const v=Number(i.dataset.cashNotas||i.dataset.cashMoedas),q=Number(i.value||0),line=v*q;total+=line;const id=`line-${i.dataset.cashNotas?'notas':'moedas'}-${String(v).replace('.','_')}`;if($(id))$(id).innerText=euro(line)});if($('cashTotal'))$('cashTotal').innerText=euro(total);return total}function renderContar(){const acts=abertas();$('contar').innerHTML=`<div class="card"><h2>Contar dinheiro</h2><select id="cashAct"><option value="">Geral</option>${acts.map(a=>`<option value="${a.id}">${a.nome}</option>`).join('')}</select><div class="grid"><div><h3>Notas</h3><table>${cashInputs('notas',notas)}</table></div><div><h3>Moedas</h3><table>${cashInputs('moedas',moedas)}</table></div></div><h3>Total: <span id="cashTotal">${euro(0)}</span></h3><button class="success" onclick="saveCashCount()">Guardar contagem</button></div><div class="card"><h2>Histórico</h2><table><thead><tr><th>ID</th><th>Secção</th><th>Total</th><th>Associado</th><th>Restante</th><th>Estado</th></tr></thead><tbody>${state.contagens.map(c=>`<tr><td>${c.id}</td><td>${c.secao}</td><td>${euro(c.total_contado)}</td><td>${euro(c.total_associado)}</td><td>${euro(c.restante)}</td><td>${c.estado}</td></tr>`).join('')}</tbody></table></div>`}async function saveCashCount(){const notasObj={},moedasObj={};document.querySelectorAll('[data-cash-notas]').forEach(i=>notasObj[i.dataset.cashNotas]=Number(i.value||0));document.querySelectorAll('[data-cash-moedas]').forEach(i=>moedasObj[i.dataset.cashMoedas]=Number(i.value||0));const total=cashPreview();if(total<=0)return alert('A contagem tem de ter valor.');const act=by('atividades',$('cashAct').value);const row={id:crypto.randomUUID(),secao:act?.conta_financeira==='agrupamento'?'Agrupamento':(act?.secao_origem||act?.secao||'Agrupamento'),atividade_id:act?.id||null,notas:notasObj,moedas:moedasObj,total_contado:total,total_associado:0,restante:total,estado:'aberta'};state.contagens.unshift(row);saveLocal();try{await insert('contagens',row);await audit('criacao_contagem',row.id,`Contagem ${euro(total)}`);await loadAll()}catch(e){alert('Contagem guardada localmente.')}}
function renderRelatorios(){const actRows=state.atividades.map(a=>{const movs=state.movimentos.filter(m=>m.atividade_id===a.id&&m.tipo==='recebimento');return `<tr><td>${a.nome}</td><td>${a.secao_origem||a.secao}</td><td>${a.ambito||'secao'}</td><td>${a.conta_financeira||'secao'}</td><td>${euro(movs.reduce((s,m)=>s+Number(m.valor||0),0))}</td><td>${movs.filter(m=>m.estado_validacao==='por_validar').length}</td></tr>`}).join('');const ag=secoes.map(s=>{const total=state.movimentos.filter(m=>m.ambito==='agrupamento'&&m.secao_origem===s).reduce((a,m)=>a+Number(m.valor||0),0);return `<tr><td>${s}</td><td>${euro(total)}</td></tr>`}).join('');$('relatorios').innerHTML=`<div class="card"><h2>Resumo por atividade</h2><table><thead><tr><th>Atividade</th><th>Origem</th><th>Âmbito</th><th>Conta</th><th>Recebido</th><th>Por validar</th></tr></thead><tbody>${actRows}</tbody></table></div><div class="card"><h2>Agrupamento por secção origem</h2><table><thead><tr><th>Secção origem</th><th>Total lançado para agrupamento</th></tr></thead><tbody>${ag}</tbody></table></div>`}function renderAuditoria(){$('auditoria').innerHTML=`<div class="card"><h2>Auditoria</h2><table><thead><tr><th>Data</th><th>Tipo</th><th>Detalhe</th></tr></thead><tbody>${state.auditoria.map(a=>`<tr><td>${a.created_at||''}</td><td>${a.tipo}</td><td>${a.detalhe}</td></tr>`).join('')}</tbody></table></div>`}
window.addEventListener('storage',loadLocal);init();
</script></body></html>
